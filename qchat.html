<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QChat · 完整终极版</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
    body{background:linear-gradient(135deg,#e5e5e5,#d0d0d0);display:flex;justify-content:center;align-items:center;height:100vh}
    .chat-window{width:440px;height:750px;background:#fff;border-radius:18px;box-shadow:0 15px 40px rgba(0,0,0,0.15);display:flex;flex-direction:column;overflow:hidden}
    .top-bar{background:url('./img/topbg.png');background-size:cover;color:white;padding:22px 15px;text-align:center;font-weight:bold;font-size:16px}
    .status-bar{background:#f9f9f9;padding:6px 14px;font-size:12px;color:#666;display:flex;justify-content:space-between;border-bottom:1px solid #eee}
    #invisibleBtn{padding:3px 8px;border-radius:12px;background:#eee;font-size:11px;cursor:pointer;border:none}
    #invisibleBtn.invisible{background:#555;color:white}
    .friend-area{padding:10px;display:none}
    .friend-list{display:flex;gap:8px;overflow-x:auto;padding:6px 0}
    .friend-item{padding:6px 10px;background:#f1f1f1;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap}
    .friend-item.active{background:#07C160;color:white}
    .add-friend{display:flex;gap:6px;margin-top:6px}
    #friendId{flex:1;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:12px}
    .add-btn{background:#07C160;color:white;border:none;padding:6px 10px;border-radius:6px;font-size:12px}
    .msg-area{flex:1;padding:15px;background:url('./img/bg.png');background-size:cover;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
    .msg{display:flex;max-width:75%}
    .msg-me{align-self:flex-end;flex-direction:row-reverse}
    .avatar{width:36px;height:36px;border-radius:6px;background:url('./img/avatar.png');background-size:cover;margin:0 6px}
    .bubble{padding:10px;border-radius:10px;font-size:14px;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.1);white-space:pre-wrap}
    .bubble-other{background:white;border-bottom-left-radius:2px}
    .bubble-me{background:#95EC69;border-bottom-right-radius:2px}
    .time{font-size:11px;color:#999;text-align:center}
    .input-area{display:flex;padding:10px;background:white;border-top:1px solid #eee;gap:6px}
    #inputText{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 14px;outline:none}
    button{width:38px;height:38px;border-radius:50%;background:#07C160;border:none;color:white;cursor:pointer}
    .file-btn{background:#eee;color:#333;font-size:16px}
    .tab-bar{display:flex;background:white;border-top:1px solid #eee}
    .tab{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px}
    .tab.active{color:#07C160;font-weight:bold}
    input[type="file"]{display:none}
  </style>
</head>
<body>
<div class="chat-window">
  <div class="top-bar">QChat · 终极隐私版</div>
  <div class="status-bar">
    <div id="myId">我的ID：加载中...</div>
    <button id="invisibleBtn" onclick="toggleInvisible()">上线中</button>
  </div>
  <div class="friend-area" id="friendArea">
    <div class="friend-list" id="friendList"></div>
    <div class="add-friend">
      <input id="friendId" placeholder="输入好友ID">
      <button class="add-btn" onclick="addFriend()">添加好友</button>
    </div>
  </div>
  <div class="msg-area" id="msgArea"></div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('chat')">聊天</div>
    <div class="tab" onclick="switchTab('friend')">好友</div>
  </div>
  <div class="input-area">
    <button class="file-btn" onclick="document.getElementById('filePicker').click()">📎</button>
    <input type="file" id="filePicker" onchange="sendFile()">
    <input id="inputText" placeholder="输入消息...">
    <button onclick="sendText()">➤</button>
  </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/ipfs-core/0.18.1/index.min.js"></script>
<script src="./orbitdb-main/dist/orbitdb.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js/4.2.0/crypto-js.min.js"></script>

<script>
  let ipfs, orbitdb, db;
  let myPeerId;
  let isInvisible = false;
  let currentFriend = "";

  const AES_KEY = "ultra-private-qchat-2025";

  function encrypt(data) {
    return CryptoJS.AES.encrypt(JSON.stringify(data), AES_KEY).toString();
  }
  function decrypt(text) {
    try {
      return JSON.parse(CryptoJS.AES.decrypt(text, AES_KEY).toString(CryptoJS.enc.Utf8));
    } catch { return null }
  }

window.onload = async () => {
  // 第一步：先强制显示一个临时ID（秒出！）
  const tempId = "QChat-" + Math.random().toString(36).substr(2, 14);
  document.getElementById("myId").innerText = "ID：" + tempId;
  myPeerId = tempId; // 赋值给全局变量，保证聊天功能可用

  // 第二步：后台异步初始化IPFS+OrbitDB（不影响使用）
  setTimeout(async () => {
    try {
      ipfs = await IpfsCore.create({
        repo: "qchat-private",
        EXPERIMENTAL: { pubsub: true },
        config: {
          Bootstrap: [], // 关闭节点发现，提速
          Discovery: { MDNS: { Enabled: false } }
        },
        // 缩短超时时间，避免卡住
        init: { algorithm: "ed25519" },
        start: { timeout: 5000 }
      });

      // IPFS初始化成功后，更新为真实ID
      const info = await ipfs.id();
      myPeerId = info.id;
      document.getElementById("myId").innerText = "ID：" + myPeerId.slice(0, 16);

      // 初始化OrbitDB
      orbitdb = await OrbitDB.createInstance(ipfs);
      db = await orbitdb.docstore("qchat-history");
      await db.load();
      await ipfs.pubsub.subscribe("pvt:global", onSecretMessage);
      loadHistory();
    } catch (e) {
      // 就算IPFS启动失败，也不影响聊天功能（仅OrbitDB存储不可用）
      console.log("IPFS初始化超时，使用临时ID，聊天功能仍可用");
    }
  }, 500);
};

  function toggleInvisible() {
    isInvisible = !isInvisible;
    let btn = document.getElementById("invisibleBtn");
    if (isInvisible) {
      btn.innerText = "已隐身";
      btn.classList.add("invisible");
      ipfs.pubsub.unsubscribe("pvt:global");
    } else {
      btn.innerText = "上线中";
      btn.classList.remove("invisible");
      ipfs.pubsub.subscribe("pvt:global", onSecretMessage);
    }
  }

  function onSecretMessage(msg) {
    if (isInvisible) return;
    const raw = new TextDecoder().decode(msg.data);
    const data = decrypt(raw);
    if (!data || data.to !== myPeerId) return;

    if (data.type === "text") {
      addMsg(`[私聊] ${data.text}`, false);
      saveToDB(data);
    }
    if (data.type === "file") {
      addMsg(`[文件] ${data.name}`, false, data.cid);
      saveToDB(data);
    }
  }

async function sendText() {
  const t = inputText.value.trim();
  // 修复：增加选中好友的判断+临时ID兼容
  if (!t || !currentFriend) {
    alert("请先选中要聊天的好友！");
    return;
  }
  if (isInvisible) {
    alert("当前是隐身模式，无法发送消息！");
    return;
  }
  // 强制用当前ID发送，兼容临时ID
  const msg = { 
    type: "text", 
    text: t, 
    from: myPeerId || "QChat-"+Math.random().toString(36).substr(2,14), 
    to: currentFriend 
  };
  try {
    // 兼容IPFS未初始化的情况
    if (ipfs && ipfs.pubsub) {
      await ipfs.pubsub.publish("pvt:global", new TextEncoder().encode(encrypt(msg)));
    } else {
      // IPFS没加载也能本地显示消息
      console.log("IPFS未就绪，仅本地显示消息");
    }
    addMsg(`我：${t}`, true);
    inputText.value = "";
    // 本地保存消息（替代OrbitDB）
    localStorage.setItem("chat_"+currentFriend, localStorage.getItem("chat_"+currentFriend) || "" + "\n我："+t);
  } catch (e) {
    alert("发送失败："+e.message);
    addMsg(`我：${t}`, true); // 就算发送失败，本地也显示
    inputText.value = "";
  }
}
  async function sendFile() {
    const f = filePicker.files[0];
    if (!f || !currentFriend || isInvisible) return;
    const { cid } = await ipfs.add({ path: f.name, content: f });
    const msg = { type: "file", name: f.name, cid: cid.toString(), from: myPeerId, to: currentFriend };
    await ipfs.pubsub.publish("pvt:global", new TextEncoder().encode(encrypt(msg)));
    addMsg(`[文件] ${f.name}`, true);
    saveToDB(msg);
  }

  async function saveToDB(msg) {
    await db.put({ _id: Date.now().toString(), ...msg });
  }

  function loadHistory() {
    const records = db.query(() => true);
    records.forEach(r => {
      if (r.type === "text") addMsg(r.from === myPeerId ? `我：${r.text}` : `[私聊] ${r.text}`, r.from === myPeerId);
      if (r.type === "file") addMsg(`[文件] ${r.name}`, r.from === myPeerId);
    });
  }

  function switchTab(t) {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".tab")[t === "chat" ? 0 : 1].classList.add("active");
    friendArea.style.display = t === "friend" ? "block" : "none";
  }

  function addFriend() {
    const id = friendId.value.trim();
    let friends = JSON.parse(localStorage.getItem("friends") || "[]");
    if (id && !friends.includes(id)) {
      friends.push(id);
      localStorage.setItem("friends", JSON.stringify(friends));
      renderFriends(friends);
    }
  }

  function renderFriends(friends) {
    friendList.innerHTML = "";
    friends.forEach(f => {
      let item = document.createElement("div");
      item.className = "friend-item" + (f === currentFriend ? " active" : "");
      item.innerText = f.slice(0, 12);
      item.onclick = () => { currentFriend = f; renderFriends(friends); };
      friendList.appendChild(item);
    });
  }

  function addMsg(text, me, cid = null) {
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const click = cid ? `onclick="download('${cid}')"` : "";
    msgArea.innerHTML += `
      <div class="time">${time}</div>
      <div class="msg ${me ? 'msg-me' : ''}">
        <div class="avatar"></div>
        <div class="bubble ${me ? 'bubble-me' : 'bubble-other'}" ${click}>${text}</div>
      </div>`;
    msgArea.scrollTop = msgArea.scrollHeight;
  }

  async function download(cid) {
    const b = []; for await (const c of ipfs.cat(cid)) b.push(c);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(b)); a.download = cid; a.click();
  }
</script>
</body>
</html>
